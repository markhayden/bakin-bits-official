name: Publish release

# Cut a release for one plugin or agent package by pushing a `<id>-v<semver>`
# tag (e.g. `messaging-v0.2.0`, `patch-v0.7.0`).
#
# Plugins (plugins/<id>): builds the plugin, runs `bakin plugins publish` to
# assemble the prebuilt artifact + checksum, carries forward the previous
# release's whiskit-artifacts.json, and attaches everything to a GitHub
# release. Consumers install with no toolchain:
#   bakin plugins install github:markhayden/bakin-bits-official#plugins/messaging
#
# Agent packages (agents/<id>): no build and no artifact — agent installs are
# pure git (`bakin agents install github:...#agents/<id>`, pinnable with
# `@<tag>`). The release is notes-only and is NOT marked latest, so the stable
# `releases/latest/download/whiskit-artifacts.json` redirect keeps pointing at
# the newest plugin catalog.
#
# Index entry URLs are pinned to THIS tag's release (releases/download/<tag>/...),
# and carried-forward entries keep their own older-release URLs — so the latest
# release's index stays a complete catalog even though plugins release
# independently. Only whiskit-artifacts.json itself is read via the stable
# releases/latest/download redirect.
#
# Note: this clones + runs Bakin from source to get `bakin plugins publish`.
# Switch to a downloaded released binary once a Bakin release ships the command.

on:
  push:
    tags:
      - '*-v*'

permissions:
  contents: write

# Serialize releases so the carry-forward index isn't built from a racing latest.
concurrency:
  group: whiskit-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Parse + validate tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          ID="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          if [ -z "$ID" ] || [ -z "$VERSION" ] || [ "$ID" = "$TAG" ]; then
            echo "::error::Tag '$TAG' must be of the form <id>-v<semver> (e.g. messaging-v0.2.0, patch-v0.7.0)"
            exit 1
          fi
          if [ -d "plugins/$ID" ]; then
            KIND="plugin"
            MANIFEST="plugins/$ID/bakin-plugin.json"
          elif [ -d "agents/$ID" ]; then
            KIND="agent"
            MANIFEST="agents/$ID/bakin-package.json"
          else
            echo "::error::No plugins/$ID or agents/$ID directory for tag '$TAG'"
            exit 1
          fi
          # The manifest version is the source of truth; the tag must agree so
          # the release name matches what gets published.
          MANIFEST_VERSION="$(jq -r '.version' "$MANIFEST")"
          if [ "$MANIFEST_VERSION" != "$VERSION" ]; then
            echo "::error::Tag '$TAG' is v$VERSION but $MANIFEST is version '$MANIFEST_VERSION'. Bump the manifest version to match the tag (or retag)."
            exit 1
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "kind=$KIND" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $KIND $ID@$VERSION"

      - name: Build the plugin
        if: steps.tag.outputs.kind == 'plugin'
        run: |
          bun install --frozen-lockfile
          (cd .build-sdk && bun install --frozen-lockfile)
          bun run build

      - name: Get Bakin (publish tool)
        if: steps.tag.outputs.kind == 'plugin'
        run: |
          git clone --depth 1 https://github.com/markhayden/bakin.git "$RUNNER_TEMP/bakin"
          (cd "$RUNNER_TEMP/bakin" && bun install --frozen-lockfile)

      - name: Carry forward the previous release index
        if: steps.tag.outputs.kind == 'plugin'
        run: |
          mkdir -p "$RUNNER_TEMP/release"
          curl -fsSL "https://github.com/${{ github.repository }}/releases/latest/download/whiskit-artifacts.json" \
            -o "$RUNNER_TEMP/release/whiskit-artifacts.json" \
            || echo "No previous index (first release) — starting a fresh catalog."

      - name: Publish artifact
        if: steps.tag.outputs.kind == 'plugin'
        run: |
          cd "$RUNNER_TEMP/bakin"
          bun run cli/bakin.ts plugins publish \
            "$GITHUB_WORKSPACE/plugins/${{ steps.tag.outputs.id }}" \
            --out "$RUNNER_TEMP/release" \
            --base-url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"

      - name: Compose release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # Release notes = your annotated-tag message. Write notes with:
          #   git tag -a messaging-v0.2.0 -m "What changed in this release"
          # We read the tag message via the GitHub API, NOT local git: actions/
          # checkout peels annotated tags to lightweight, so `git for-each-ref
          # %(contents)` would return the commit message instead. The API always
          # sees the real tag object. A lightweight tag (no -a) falls back to the
          # commit message. The install line is always appended.
          REF="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")"
          OBJ_TYPE="$(echo "$REF" | jq -r '.object.type')"
          OBJ_SHA="$(echo "$REF" | jq -r '.object.sha')"
          if [ "$OBJ_TYPE" = "tag" ]; then
            MSG="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${OBJ_SHA}" --jq '.message')"
          else
            MSG="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${OBJ_SHA}" --jq '.commit.message')"
          fi
          if [ "${{ steps.tag.outputs.kind }}" = "plugin" ]; then
            INSTALL="bakin plugins install github:${GITHUB_REPOSITORY}#plugins/${{ steps.tag.outputs.id }}"
          else
            INSTALL="bakin agents install github:${GITHUB_REPOSITORY}@${TAG}#agents/${{ steps.tag.outputs.id }}"
          fi
          {
            printf '%s\n' "$MSG"
            echo
            echo "---"
            echo "Install: \`$INSTALL\`"
          } > "$RUNNER_TEMP/notes.md"

      # Plugin releases carry the artifact catalog and become `latest` — the
      # stable releases/latest/download/whiskit-artifacts.json redirect must
      # always resolve to a release that has the catalog attached.
      - name: Create GitHub release (plugin)
        if: steps.tag.outputs.kind == 'plugin'
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ runner.temp }}/release/*
          body_path: ${{ runner.temp }}/notes.md
          make_latest: true

      # Agent releases are notes-only (installs are pure git) and never take
      # `latest`, so plugin catalog resolution is untouched.
      - name: Create GitHub release (agent)
        if: steps.tag.outputs.kind == 'agent'
        uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ runner.temp }}/notes.md
          make_latest: false
